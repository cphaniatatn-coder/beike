<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mandarin Reader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        
        /* Area Input */
        #input-area { width: 100%; height: 150px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; resize: vertical; }
        button { background: #3498db; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2980b9; }

        /* Area Membaca */
        #reader-display { margin-top: 30px; padding: 20px; border-top: 2px solid #eee; font-size: 24px; line-height: 2; }
        
        /* Styling Kata yang bisa diklik */
        .word { cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background 0.2s; position: relative; }
        .word:hover { background: #ffeaa7; color: #d35400; }
        
        /* Warna berdasarkan Level (Contoh) */
        .level-a1 { border-bottom: 2px solid #2ecc71; }
        .level-a2 { border-bottom: 2px solid #3498db; }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Mandarin Reader</h1>
    
    <textarea id="input-area" placeholder="Tempel teks Mandarin di sini..."></textarea>
    <br>
    <button onclick="processText()">Mulai Membaca</button>

    <div id="reader-display">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jieba-js@1.0.2/dist/jieba.js"></script>

<script>
    // Inisialisasi Kamus Sederhana (Nanti bisa kita hubungkan ke database Excel/JSON kamu)
    const simpleDict = {
        "老師": { pinyin: "lǎoshī", definition: "Guru / Teacher", level: "A1" },
        "學生": { pinyin: "xuésheng", definition: "Siswa / Student", level: "A1" },
        "學習": { pinyin: "xuéxí", definition: "Belajar / To study", level: "A2" },
        "你好": { pinyin: "nǐhǎo", definition: "Halo / Hello", level: "A1" }
    };

    // Fungsi utama untuk memproses teks
    async function processText() {
        const text = document.getElementById('input-area').value;
        const display = document.getElementById('reader-display');
        
        if (!text) return;
        display.innerHTML = "Memproses teks...";

        // Menggunakan Jieba untuk memotong kata
        // Di lingkungan web, kita menggunakan fungsi cut
        const words = nodeJieba.cut(text); 

        display.innerHTML = ""; // Bersihkan tampilan

        words.forEach(word => {
            const span = document.createElement('span');
            span.className = 'word';
            
            // Cek apakah kata ada di kamus kita
            if (simpleDict[word]) {
                span.classList.add('level-' + simpleDict[word].level.toLowerCase());
                span.title = simpleDict[word].pinyin; // Muncul saat mouse di atas kata
            }

            span.innerText = word;
            
            // Fungsi saat diklik
            span.onclick = () => showDetail(word);
            
            display.appendChild(span);
        });
    }

    function showDetail(word) {
        const data = simpleDict[word];
        if (data) {
            alert(`Kata: ${word}\nPinyin: ${data.pinyin}\nArti: ${data.definition}\nLevel: ${data.level}`);
        } else {
            alert(`Kata: ${word}\n(Belum ada di kamus)`);
        }
    }
</script>

</body>
</html>
